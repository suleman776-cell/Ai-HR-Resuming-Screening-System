<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Recruiter Pro</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary":                   "#00658d",
                        "primary-container":         "#00a3e0",
                        "primary-fixed":             "#c6e7ff",
                        "primary-fixed-dim":         "#81cfff",
                        "on-primary":                "#ffffff",
                        "on-primary-container":      "#00354b",
                        "on-primary-fixed":          "#001e2d",
                        "on-primary-fixed-variant":  "#004c6b",
                        "secondary":                 "#3c637a",
                        "secondary-container":       "#bbe2fe",
                        "secondary-fixed":           "#c6e7ff",
                        "secondary-fixed-dim":       "#a5cce7",
                        "on-secondary":              "#ffffff",
                        "on-secondary-container":    "#3f657d",
                        "on-secondary-fixed":        "#001e2d",
                        "on-secondary-fixed-variant":"#234b62",
                        "tertiary":                  "#8b5000",
                        "tertiary-container":        "#da841a",
                        "tertiary-fixed":            "#ffdcbe",
                        "tertiary-fixed-dim":        "#ffb872",
                        "on-tertiary":               "#ffffff",
                        "on-tertiary-container":     "#4a2800",
                        "on-tertiary-fixed":         "#2d1600",
                        "on-tertiary-fixed-variant": "#6a3c00",
                        "error":                     "#ba1a1a",
                        "error-container":           "#ffdad6",
                        "on-error":                  "#ffffff",
                        "on-error-container":        "#93000a",
                        "background":                "#f7f9fb",
                        "on-background":             "#191c1e",
                        "surface":                   "#f7f9fb",
                        "surface-bright":            "#f7f9fb",
                        "surface-dim":               "#d8dadc",
                        "surface-variant":           "#e0e3e5",
                        "surface-tint":              "#00658d",
                        "surface-container-lowest":  "#ffffff",
                        "surface-container-low":     "#f2f4f6",
                        "surface-container":         "#eceef0",
                        "surface-container-high":    "#e6e8ea",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface":                "#191c1e",
                        "on-surface-variant":        "#3e4850",
                        "outline":                   "#6e7881",
                        "outline-variant":           "#bdc8d1",
                        "inverse-primary":           "#81cfff",
                        "inverse-surface":           "#2d3133",
                        "inverse-on-surface":        "#eff1f3"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg:      "0.5rem",
                        xl:      "0.75rem",
                        full:    "9999px"
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body:     ["Inter"],
                        label:    ["Inter"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .bg-mesh {
            background-color: #f7f9fb;
            background-image:
                radial-gradient(at 0% 0%,   rgba(0,163,224,0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0,101,141,0.08) 0px, transparent 50%);
        }
    </style>
</head>

<body class="bg-mesh min-h-screen flex flex-col items-center justify-center p-6 text-on-surface">

    <!-- Brand -->
    <div class="text-center mb-10 z-10">
        <h1 class="text-3xl font-black tracking-tight text-primary">Recruiter Pro</h1>
        <p class="text-on-surface-variant font-medium mt-2">The Digital Curator for Human Potential</p>
    </div>

    <!-- Sign-up Card -->
    <main class="w-full max-w-[440px] z-10">
        <section class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0px_12px_32px_rgba(0,30,45,0.06)] relative overflow-hidden">

            <!-- Top accent bar -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary to-primary-container"></div>

            <header class="mb-8">
                <h2 class="text-2xl font-bold text-on-surface">Create Account</h2>
                <p class="text-on-surface-variant text-sm mt-1">Join our AI-powered talent network.</p>
            </header>

            <!-- Error / success alerts -->
            <div id="errorAlert"   class="hidden mb-4 p-3 rounded-lg bg-error-container text-on-error-container text-sm font-medium"></div>
            <div id="successAlert" class="hidden mb-4 p-3 rounded-lg bg-green-50 text-green-800 text-sm font-medium"></div>

            <form id="signupForm" novalidate class="space-y-5">

                <!-- Username -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-1" for="username">
                        Username
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
                            <span class="material-symbols-outlined text-[20px]">person</span>
                        </div>
                        <input
                            id="username"
                            name="username"
                            type="text"
                            autocomplete="username"
                            required
                            placeholder="Choose a username"
                            class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all duration-200"
                        />
                        <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary transition-all duration-300 group-focus-within:w-full"></div>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-1" for="password">
                        Password
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </div>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="new-password"
                            required
                            placeholder="••••••••"
                            class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all duration-200"
                        />
                        <button
                            type="button"
                            onclick="togglePassword()"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors"
                            aria-label="Toggle password visibility"
                        >
                            <span class="material-symbols-outlined text-[20px]" id="eyeIcon">visibility</span>
                        </button>
                        <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary transition-all duration-300 group-focus-within:w-full"></div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="pt-2">
                    <button
                        id="signupBtn"
                        type="submit"
                        class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200"
                    >
                        Create Account
                    </button>
                </div>
            </form>

            <footer class="mt-8 pt-6 border-t border-outline-variant/15 text-center">
                <p class="text-sm text-on-surface-variant">
                    Already have an account?
                    <a href="/login" class="text-primary font-bold hover:underline ml-1">Sign In</a>
                </p>
            </footer>
        </section>
    </main>

    <!-- Background blobs -->
    <div class="fixed top-[-10%] right-[-5%] w-[40%] h-[60%] pointer-events-none opacity-20 hidden lg:block">
        <div class="w-full h-full bg-gradient-to-br from-primary-container to-transparent rounded-full blur-[120px]"></div>
    </div>
    <div class="fixed bottom-[-10%] left-[-5%] w-[35%] h-[50%] pointer-events-none opacity-20 hidden lg:block">
        <div class="w-full h-full bg-gradient-to-tr from-secondary-container to-transparent rounded-full blur-[100px]"></div>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('jwt_token')) {
            window.location.href = '/dashboard';
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type  = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type  = 'password';
                icon.textContent = 'visibility';
            }
        }

        function showAlert(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideAlerts() {
            document.getElementById('errorAlert').classList.add('hidden');
            document.getElementById('successAlert').classList.add('hidden');
        }

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideAlerts();

            const btn      = document.getElementById('signupBtn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showAlert('errorAlert', 'Username and password are required.');
                return;
            }

            btn.textContent = 'Creating account…';
            btn.disabled    = true;

            try {
                // Step 1 — Register via server-side endpoint
                const regRes = await fetch('/signup', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body:    new URLSearchParams({ username, password })
                });

                // Signup redirects to /login on success
                if (!regRes.redirected || !regRes.url.includes('/login')) {
                    throw new Error('Username already taken. Please choose another.');
                }

                // Step 2 — Auto-login to get JWT
                const loginRes  = await fetch('/api/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password })
                });
                const loginData = await loginRes.json();

                if (!loginRes.ok) {
                    throw new Error(loginData.error || 'Auto-login failed. Please sign in manually.');
                }

                // Step 3 — Persist token + establish Flask session
                localStorage.setItem('jwt_token', loginData.token);
                localStorage.setItem('jwt_user',  JSON.stringify(loginData.user));

                await fetch('/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body:    new URLSearchParams({ username, password })
                });

                showAlert('successAlert', 'Account created! Redirecting…');
                setTimeout(() => window.location.href = '/dashboard', 800);

            } catch (err) {
                showAlert('errorAlert', err.message);
                btn.textContent = 'Create Account';
                btn.disabled    = false;
            }
        });
    </script>
</body>
</html>
