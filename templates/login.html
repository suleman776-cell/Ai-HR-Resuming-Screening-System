<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Recruiter Pro</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary":                   "#00658d",
                        "primary-container":         "#00a3e0",
                        "primary-fixed":             "#c6e7ff",
                        "on-primary":                "#ffffff",
                        "on-primary-container":      "#00354b",
                        "secondary":                 "#3c637a",
                        "secondary-container":       "#bbe2fe",
                        "on-secondary":              "#ffffff",
                        "error":                     "#ba1a1a",
                        "error-container":           "#ffdad6",
                        "on-error-container":        "#93000a",
                        "background":                "#f7f9fb",
                        "on-background":             "#191c1e",
                        "surface":                   "#f7f9fb",
                        "surface-container-lowest":  "#ffffff",
                        "surface-container-low":     "#f2f4f6",
                        "surface-container":         "#eceef0",
                        "surface-container-high":    "#e6e8ea",
                        "on-surface":                "#191c1e",
                        "on-surface-variant":        "#3e4850",
                        "outline":                   "#6e7881",
                        "outline-variant":           "#bdc8d1"
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body:     ["Inter"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .bg-mesh {
            background-color: #f7f9fb;
            background-image:
                radial-gradient(at 0% 0%,    rgba(0,163,224,0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0,101,141,0.08) 0px, transparent 50%);
        }
    </style>
</head>

<body class="bg-mesh min-h-screen flex flex-col items-center justify-center p-6 text-on-surface">

    <!-- Brand -->
    <div class="text-center mb-10 z-10">
        <h1 class="text-3xl font-black tracking-tight text-primary">Recruiter Pro</h1>
        <p class="text-on-surface-variant font-medium mt-2">The Digital Curator for Human Potential</p>
    </div>

    <!-- Login Card -->
    <main class="w-full max-w-[440px] z-10">
        <section class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0px_12px_32px_rgba(0,30,45,0.06)] relative overflow-hidden">

            <!-- Top accent bar -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary to-primary-container"></div>

            <header class="mb-8">
                <h2 class="text-2xl font-bold text-on-surface">Welcome Back</h2>
                <p class="text-on-surface-variant text-sm mt-1">Please enter your details to continue.</p>
            </header>

            <!-- Error alert (JS-driven) -->
            <div id="errorAlert" class="hidden mb-4 p-3 rounded-lg bg-error-container text-on-error-container text-sm font-medium"></div>

            <form id="loginForm" novalidate class="space-y-5">

                <!-- Username -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-1" for="username">
                        Username
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
                            <span class="material-symbols-outlined text-[20px]">person</span>
                        </div>
                        <input
                            id="username"
                            type="text"
                            autocomplete="username"
                            required
                            placeholder="Enter your username"
                            class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all duration-200"
                        />
                        <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary transition-all duration-300 group-focus-within:w-full"></div>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-1" for="password">
                        Password
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </div>
                        <input
                            id="password"
                            type="password"
                            autocomplete="current-password"
                            required
                            placeholder="••••••••"
                            class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all duration-200"
                        />
                        <button
                            type="button"
                            onclick="togglePassword()"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors"
                            aria-label="Toggle password visibility"
                        >
                            <span class="material-symbols-outlined text-[20px]" id="eyeIcon">visibility</span>
                        </button>
                        <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary transition-all duration-300 group-focus-within:w-full"></div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="pt-2">
                    <button
                        id="loginBtn"
                        type="submit"
                        class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200"
                    >
                        Login to Dashboard
                    </button>
                </div>
            </form>

            <footer class="mt-8 pt-6 border-t border-outline-variant/15 text-center space-y-3">
                <p class="text-sm text-on-surface-variant">
                    Don't have an account?
                    <a href="/signup" class="text-primary font-bold hover:underline ml-1">Create Account</a>
                </p>
            </footer>
        </section>
    </main>

    <!-- Background blobs -->
    <div class="fixed top-[-10%] right-[-5%] w-[40%] h-[60%] pointer-events-none opacity-20 hidden lg:block">
        <div class="w-full h-full bg-gradient-to-br from-primary-container to-transparent rounded-full blur-[120px]"></div>
    </div>
    <div class="fixed bottom-[-10%] left-[-5%] w-[35%] h-[50%] pointer-events-none opacity-20 hidden lg:block">
        <div class="w-full h-full bg-gradient-to-tr from-secondary-container to-transparent rounded-full blur-[100px]"></div>
    </div>

    <script>
        // Only redirect if BOTH token AND user are present — avoids loop on stale data
        const _t = localStorage.getItem('jwt_token');
        const _u = JSON.parse(localStorage.getItem('jwt_user') || 'null');
        if (_t && _u && _u.role) {
            window.location.replace(_u.role === 'admin' ? '/admin' : '/candidate');
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type       = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type       = 'password';
                icon.textContent = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn      = document.getElementById('loginBtn');
            const errEl    = document.getElementById('errorAlert');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errEl.classList.add('hidden');

            if (!username || !password) {
                errEl.textContent = 'Username and password are required.';
                errEl.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2 align-middle"></span>Logging in…';
            btn.disabled  = true;

            try {
                // ── Call JWT API ──────────────────────────────────────────
                const res  = await fetch('/api/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Login failed');

                // ── Save token to localStorage ────────────────────────────
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('jwt_user',  JSON.stringify(data.user));

                // ── Also establish Flask session (for server-rendered pages) ──
                await fetch('/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body:    new URLSearchParams({ username, password })
                });

                // ── Route by role ─────────────────────────────────────────
                window.location.replace(data.user.role === 'admin' ? '/admin' : '/candidate');

            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
                btn.innerHTML = 'Login to Dashboard';
                btn.disabled  = false;
            }
        });
    </script>
</body>
</html>
