<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Recruitment Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .bg-blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(135deg, rgba(37,117,252,0.2), rgba(106,17,203,0.2));
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }
        @keyframes float {
            0%   { transform: translate(-10%, -10%); }
            100% { transform: translate(20%, 20%); }
        }
        .auth-card {
            width: 420px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 1;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .brand-logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg,#6a11cb,#2575fc);
            color: white;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin: auto;
            font-size: 1.8rem;
        }
        .form-control, .form-select { border-radius: 10px; }
        .btn-login {
            background: #1e293b; color: white;
            border-radius: 10px; padding: 12px;
            font-weight: 600; border: none;
        }
        .btn-login:hover { background: black; color: white; }
        .register-link { color:#2575fc; font-weight:600; text-decoration:none; }
        @media(max-width:480px){ .auth-card{ width:90%; padding:25px; } }
    </style>
</head>
<body>

<div class="bg-blob"></div>

<div class="auth-card">
    <div class="brand-logo"><i class="bi bi-cpu-fill"></i></div>

    <div class="text-center mb-4">
        <h3>Welcome Back</h3>
        <p class="text-muted small">Login to your account</p>
    </div>

    <!-- Error alert (shown by JS) -->
    <div id="errorAlert" class="alert alert-danger small py-2 d-none"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Enter username" required autocomplete="username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" required autocomplete="current-password">
                <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>

        <button id="loginBtn" type="submit" class="btn btn-login w-100">
            Login <i class="bi bi-arrow-right"></i>
        </button>
    </form>

    <div class="text-center mt-4 pt-3 border-top">
        <p class="small text-muted mb-0">Don't have an account?</p>
        <a href="{{ url_for('signup') }}" class="register-link small">Create Candidate Account</a>
    </div>
</div>

<script>
    // If already logged in, skip to dashboard
    if (localStorage.getItem('jwt_token')) {
        window.location.href = '/dashboard';
    }

    function togglePassword() {
        const p = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (p.type === 'password') {
            p.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            p.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn       = document.getElementById('loginBtn');
        const errorDiv  = document.getElementById('errorAlert');
        const username  = document.getElementById('username').value.trim();
        const password  = document.getElementById('password').value;

        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
        btn.disabled  = true;
        errorDiv.classList.add('d-none');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || 'Login failed');
            }

            // ── Save token + user info to localStorage ──────────────────────
            localStorage.setItem('jwt_token',  data.token);
            localStorage.setItem('jwt_user',   JSON.stringify(data.user));

            // Also hit the server-side session login so Flask templates work
            await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username, password })
            });

            window.location.href = '/dashboard';

        } catch (err) {
            errorDiv.textContent = err.message;
            errorDiv.classList.remove('d-none');
            btn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
            btn.disabled  = false;
        }
    });
</script>
</body>
</html>
